<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="60%" stop-color="#0a0514"/>
      <stop offset="100%" stop-color="#020105"/>
    </radialGradient>

    <!-- Text gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00cc"/>
      <stop offset="35%" stop-color="#00f0ff"/>
      <stop offset="70%" stop-color="#7b2ff7"/>
      <stop offset="100%" stop-color="#ff0055"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Strong glow for blobs -->
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="1280" height="640" fill="url(#bg-glow)"/>
  
  <!-- Noise overlay -->
  <rect width="1280" height="640" filter="url(#noise)" opacity="0.5"/>

  <!-- Grid overlay -->
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Decorative blobs -->
  <ellipse cx="200" cy="180" rx="280" ry="220" fill="#ff00cc" opacity="0.12" filter="url(#bloom)"/>
  <ellipse cx="1100" cy="480" rx="320" ry="260" fill="#00f0ff" opacity="0.10" filter="url(#bloom)"/>
  <ellipse cx="650" cy="320" rx="200" ry="200" fill="#7b2ff7" opacity="0.14" filter="url(#bloom)"/>

  <!-- Glowing orb accents -->
  <circle cx="180" cy="500" r="80" fill="#00f0ff" opacity="0.08" filter="url(#bloom)"/>
  <circle cx="1120" cy="140" r="60" fill="#ff0055" opacity="0.10" filter="url(#bloom)"/>

  <!-- Code-line decorations left side -->
  <g opacity="0.15" font-family="monospace" font-size="14" fill="#00f0ff">
    <text x="60" y="180">&lt;motion.div</text>
    <text x="80" y="205">initial={{ opacity: 0 }}</text>
    <text x="80" y="230">animate={{ opacity: 1 }}</text>
    <text x="80" y="255">transition={{ duration: 0.8 }}</text>
    <text x="60" y="280">/&gt;</text>
  </g>

  <g opacity="0.12" font-family="monospace" font-size="14" fill="#ff00cc">
    <text x="940" y="420">const scene = new THREE.Scene();</text>
    <text x="940" y="445">const camera = new THREE.PerspectiveCamera();</text>
    <text x="940" y="470">const renderer = new THREE.WebGLRenderer();</text>
    <text x="940" y="495">renderer.setPixelRatio(window.devicePixelRatio);</text>
  </g>

  <!-- Decorative brackets -->
  <text x="90" y="350" font-family="monospace" font-size="120" font-weight="300" fill="#ffffff" opacity="0.04">{ }</text>
  <text x="1060" y="280" font-family="monospace" font-size="100" font-weight="300" fill="#ffffff" opacity="0.04">&lt;/&gt;</text>

  <!-- Horizontal scanline -->
  <line x1="0" y1="320" x2="1280" y2="320" stroke="url(#text-grad)" stroke-width="1" opacity="0.15"/>

  <!-- Main title -->
  <text x="640" y="295" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="90" font-weight="900" fill="url(#text-grad)" filter="url(#glow)">vibecoding</text>

  <!-- Subtitle -->
  <text x="640" y="345" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#e2e8f0" letter-spacing="6" opacity="0.9">NEXT.JS MOTION TEMPLATE</text>

  <!-- Decorative line under title -->
  <line x1="540" y1="375" x2="740" y2="375" stroke="#ffffff" stroke-width="1" opacity="0.2"/>

  <!-- Tagline -->
  <text x="640" y="415" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#94a3b8" letter-spacing="1">GSAP • THREE.JS • R3F • FRAMER MOTION • TAILWIND v4 • SHADCN</text>

  <!-- Bottom accent dots -->
  <circle cx="615" cy="460" r="3" fill="#ff00cc" opacity="0.8"/>
  <circle cx="640" cy="460" r="3" fill="#00f0ff" opacity="0.8"/>
  <circle cx="665" cy="460" r="3" fill="#7b2ff7" opacity="0.8"/>
</svg>